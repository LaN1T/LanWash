version: '3.8'

# Production override — use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    ports: []

  backend:
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
    deploy:
      # Note: Docker Compose does not load-balance replicas across a single upstream.
      # Use Docker Swarm/Kubernetes or a separate LB for replicas > 1.
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  nginx:
    image: nginx:1.27-alpine
    container_name: lanwash_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./landing:/usr/share/nginx/landing:ro
      - ./build/web:/usr/share/nginx/app:ro
    read_only: true
    cap_drop: !override
      - ALL
    security_opt: !override
      - no-new-privileges:true
    tmpfs: !override
      - /tmp
      - /var/cache/nginx
      - /var/run
      - /var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      grafana:
        condition: service_started
      prometheus:
        condition: service_started
