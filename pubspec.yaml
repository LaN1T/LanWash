name: lanwash
description: LanWash — приложение для записи на автомойку
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  app_links: ^6.0.0
  connectivity_plus: ^6.1.0
  crypto: ^3.0.3
  cupertino_icons: ^1.0.6
  drift: ^2.31.0
  drift_flutter: ^0.2.4
  file_picker: ^8.0.0
  file_saver: ^0.3.1
  firebase_app_check: ^0.4.4+1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  fl_chart: ^0.68.0
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  flutter_local_notifications: ^21.0.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.0.10
  get_it: ^8.0.0
  http: ^1.1.0
  intl: ^0.20.2
  mobile_scanner: ^6.0.0
  path: ^1.9.0
  path_provider: ^2.1.5
  pdf: ^3.11.0
  sqlcipher_flutter_libs: ^0.6.4
  sqlite3: ^2.6.0
  printing: ^5.13.0
  provider: ^6.1.1
  qr_flutter: ^4.1.0
  share_plus: ^10.1.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.2.0
  web_socket_channel: ^2.4.0
  cached_network_image: ^3.4.0

dev_dependencies:
  build_runner: ^2.4.15
  drift_dev: ^2.26.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.0

  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  image_path_android: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1A56DB"
  adaptive_icon_foreground: "assets/icon/lw.png"
  adaptive_icon_foreground_inset: 8
  ios: true
  image_path_ios: "assets/icon/app_icon.png"
  image_path_ios_dark_transparent: "assets/icon/dark_lw.png"
  remove_alpha_ios: true
  background_color_ios: "#1A56DB"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#1A56DB"
    theme_color: "#1A56DB"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
    - assets/icon/
    - assets/fonts/
    - assets/data/car_catalog.json

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
