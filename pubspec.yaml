name: lanwash
description: LanWash — приложение для записи на автомойку
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  fl_chart: ^0.68.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  provider: ^6.1.1
  intl: ^0.20.2
  http: ^1.1.0
  crypto: ^3.0.3
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.3.1
  cupertino_icons: ^1.0.6
  pdf: ^3.11.0
  printing: ^5.13.0
  share_plus: ^10.1.0
  file_saver: ^0.3.1
  file_picker: ^8.0.0
  url_launcher: ^6.2.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  get_it: ^8.0.0
  firebase_app_check: ^0.4.4+1
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.0

  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  adaptive_icon_background: "#2563eb"
  adaptive_icon_foreground: "assets/logo.png"
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#ffffff"
    theme_color: "#2563eb"
  macos:
    generate: true
    image_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 48
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
    - assets/icon/
    - assets/fonts/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
