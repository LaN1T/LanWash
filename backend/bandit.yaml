# Bandit security scanner configuration
# https://bandit.readthedocs.io/en/latest/config.html

# Directories/files that are dev-only or test-only and produce noise
exclude_dirs:
  - tests
  - scripts
  - db/seed.py
  - locustfile.py

# Acceptable low-severity patterns for this project
skips:
  - B101   # assert_used - pytest relies on asserts in tests (tests/ excluded)
  - B110   # try_except_pass - intentional resilient fallbacks (Redis, JSON parse, etc.)
  - B112   # try_except_continue - intentional message-loop resilience
