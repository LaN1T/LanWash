services:
  db:
    image: postgres:16-alpine
    container_name: lanwash_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lanwash_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lanwash_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lanwash_user -d lanwash_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lanwash

  redis:
    image: redis:7-alpine
    container_name: lanwash_redis
    restart: always
    networks:
      - lanwash

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lanwash_backend
    restart: always
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      REDIS_URL: memory://
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lanwash

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: lanwash_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.external-url=/prometheus/'
      - '--web.route-prefix=/prometheus/'
    networks:
      - lanwash

  grafana:
    image: grafana/grafana:11.1.0
    container_name: lanwash_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - lanwash

  nginx:
    image: nginx:1.27-alpine
    container_name: lanwash_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      grafana:
        condition: service_started
      prometheus:
        condition: service_started
    networks:
      - lanwash

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  lanwash:
    driver: bridge
