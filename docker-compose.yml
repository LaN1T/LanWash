version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: lanwash_postgres
    restart: always
    environment:
      POSTGRES_USER: lanwash_user
      POSTGRES_PASSWORD: lanwash_password
      POSTGRES_DB: lanwash_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
