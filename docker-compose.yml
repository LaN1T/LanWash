version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: lanwash_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lanwash_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lanwash_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lanwash_user -d lanwash_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lanwash

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lanwash_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    networks:
      - lanwash

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: lanwash_prometheus
    restart: always
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - lanwash

  grafana:
    image: grafana/grafana:11.1.0
    container_name: lanwash_grafana
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - lanwash

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  lanwash:
    driver: bridge
