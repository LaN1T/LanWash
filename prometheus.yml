global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'lanwash-backend'
    static_configs:
      - targets: ['backend:8000', 'host.docker.internal:8000']
    metrics_path: /metrics
    basic_auth:
      username: ${PROMETHEUS_USER:-prometheus}
      password: ${PROMETHEUS_PASSWORD}
