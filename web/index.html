<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="LanWash — приложение для записи на автомойку.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://www.gstatic.com 'unsafe-eval' 'wasm-unsafe-eval'; img-src 'self' data:; frame-src 'self' http://localhost:3000; connect-src 'self' http://localhost:8000 http://127.0.0.1:8000 https://www.gstatic.com https://fonts.gstatic.com;">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="lanwash">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>lanwash</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #ffffff;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }
    .logo-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1A56DB 0%, #3B82F6 100%);
      box-shadow: 0 8px 32px rgba(26, 86, 219, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 100px;
      height: 100px;
      object-fit: contain;
    }
    .title {
      color: #0F172A;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: rgba(100, 116, 139, 0.7);
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 48px;
      max-width: 300px;
      text-align: center;
    }
    .loader {
      border: 3px solid #f3f3f3;
      border-radius: 50%;
      border-top: 3px solid #1A56DB;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @media (prefers-color-scheme: dark) {
      body { background-color: #ffffff; }
      .title { color: #0F172A; }
      .subtitle { color: rgba(100, 116, 139, 0.7); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo-circle">
      <img class="logo-icon" src="assets/icon/lw.png" alt="LanWash logo">
    </div>
    <div class="title">LanWash</div>
    <div class="subtitle">Приложение для записи на автомойку</div>
    <div class="loader"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
